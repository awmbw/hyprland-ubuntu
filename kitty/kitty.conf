# ╔══════════════════════════════════════════════════════════════╗
# ║              Kitty — Deep Ocean Theme                        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ──────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── Cursor ────────────────────────────────────────────────────
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15

# ── Scrollback ────────────────────────────────────────────────
scrollback_lines 10000

# ── Window ────────────────────────────────────────────────────
window_padding_width  8
confirm_os_window_close 0
background_opacity    0.88
dynamic_background_opacity yes

# ── URLs ──────────────────────────────────────────────────────
url_style    curly
open_url_with default

# ── Bell ──────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0

# ── Performance ───────────────────────────────────────────────
repaint_delay   6
input_delay     1
sync_to_monitor yes

# ── Tab Bar ───────────────────────────────────────────────────
tab_bar_style       powerline
tab_powerline_style slanted

# ── Color Scheme — Deep Ocean ─────────────────────────────────
foreground          #d4dce8
background          #0d2b3e
selection_foreground  #0d2b3e
selection_background  #3ba5c9

cursor              #3ba5c9
cursor_text_color   #0d2b3e

url_color           #3ba5c9

# Tab bar
active_tab_foreground   #0d2b3e
active_tab_background   #3ba5c9
inactive_tab_foreground #8a9aaa
inactive_tab_background #123748

# Normal colors
color0  #0d2b3e
color1  #c45a5a
color2  #8ab434
color3  #d4a844
color4  #3ba5c9
color5  #9a7acf
color6  #64c8b4
color7  #d4dce8

# Bright colors
color8  #1a4a5e
color9  #d47070
color10 #a0cc4e
color11 #e0be5a
color12 #52bde0
color13 #b08ee6
color14 #7eddca
color15 #eaf0f8

# Marks
mark1_foreground #0d2b3e
mark1_background #3ba5c9
mark2_foreground #0d2b3e
mark2_background #8ab434
mark3_foreground #0d2b3e
mark3_background #d4c48a
