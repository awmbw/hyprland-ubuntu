# ╔══════════════════════════════════════════════════════════════╗
# ║              tmux — Deep Ocean Theme                         ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Prefix ────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# ── Keybindings ───────────────────────────────────────────────
# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Status Bar ────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#0d2b3e,fg=#d4dce8"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[fg=#0d2b3e,bg=#3ba5c9,bold] #{session_name} #[fg=#3ba5c9,bg=#0d2b3e] "
set -g status-right "#[fg=#1a4a5e] %H:%M #[fg=#3ba5c9]│#[fg=#d4dce8] %b %d "

# Window status
setw -g window-status-format "#[fg=#1a4a5e] #{window_index}:#{window_name} "
setw -g window-status-current-format "#[fg=#3ba5c9,bold] #{window_index}:#{window_name} "

# Pane borders
set -g pane-border-style "fg=#123748"
set -g pane-active-border-style "fg=#3ba5c9"

# Message style
set -g message-style "bg=#123748,fg=#3ba5c9"
