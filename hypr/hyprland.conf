# ╔══════════════════════════════════════════════════════════════╗
# ║              HYPRLAND — Sleek & Fast Config                 ║
# ║              Ubuntu 26.04 LTS · NVIDIA GTX 1650             ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Source Modular Configs ────────────────────────────────────
source = ~/.config/hypr/nvidia.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/autostart.conf

# ── General ───────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(3ba5c9ee) rgba(8ab434ee) 45deg
    col.inactive_border = rgba(0d2b3e88)

    layout = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────
decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0, 0, 0, 0.35)
        offset = 0 4
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        new_optimizations = true
        xray = false
    }
}

# ── Animations ────────────────────────────────────────────────
animations {
    enabled = true

    # Bezier curves for smooth, snappy motion
    bezier = snappy, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 4, snappy, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, snappy
    animation = border, 1, 10, default
    animation = borderangle, 1, 100, default, loop
    animation = fade, 1, 4, smoothIn
    animation = fadeDim, 1, 4, smoothIn
    animation = workspaces, 1, 5, overshot, slidevert
}

# ── Input ─────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# ── Gestures ──────────────────────────────────────────────────
gesture = 3, horizontal, workspace

# ── Layouts ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# ── Misc ──────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 1
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
}

# ── Cursor ────────────────────────────────────────────────────
cursor {
    no_hardware_cursors = true
    inactive_timeout = 5
}

# ── XWayland ──────────────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
