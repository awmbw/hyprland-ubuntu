# ╔══════════════════════════════════════════════════════════════╗
# ║              Window Rules (Hyprland 0.53+ syntax)            ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Floating Windows ──────────────────────────────────────────
windowrule = float 1, match:class pavucontrol
windowrule = float 1, match:class nm-connection-editor
windowrule = float 1, match:class blueman-manager
windowrule = float 1, match:class thunar, match:title File Operation Progress
windowrule = float 1, match:class thunar, match:title Confirm to replace files
windowrule = float 1, match:title Open File
windowrule = float 1, match:title Save File
windowrule = float 1, match:title Open Folder
windowrule = float 1, match:class xdg-desktop-portal-gtk
windowrule = float 1, match:class org.gnome.Calculator
windowrule = float 1, match:class org.gnome.Settings

# ── Size Constraints ──────────────────────────────────────────
windowrule = size 800 500, match:class pavucontrol
windowrule = size 800 500, match:class nm-connection-editor
windowrule = size 800 500, match:class blueman-manager
windowrule = center 1, match:class pavucontrol
windowrule = center 1, match:class nm-connection-editor

# ── Opacity Overrides ────────────────────────────────────────
windowrule = opacity 0.88 0.85, match:class kitty
windowrule = opacity 0.90 0.88, match:class thunar
windowrule = opacity 0.95 0.92, match:class code
windowrule = opacity 0.95 0.92, match:class Code
windowrule = opacity 0.95 0.92, match:class code-url-handler

# ── Full Opacity for Media ────────────────────────────────────
windowrule = opacity 1.0 1.0, match:class firefox
windowrule = opacity 1.0 1.0, match:class mpv
windowrule = opacity 1.0 1.0, match:class vlc
windowrule = opacity 1.0 1.0, match:fullscreen 1

# ── XWayland Video Bridge ────────────────────────────────────
windowrule = opacity 0.0 override, match:class xwaylandvideobridge
windowrule = no_anim 1, match:class xwaylandvideobridge
windowrule = no_initial_focus 1, match:class xwaylandvideobridge
windowrule = max_size 1 1, match:class xwaylandvideobridge

# ── Layer Rules (for blur on launcher/bar) ────────────────────
layerrule {
    name = waybar
    blur = true
    ignore_alpha = 0
}

layerrule {
    name = rofi
    blur = true
    ignore_alpha = 0
}

layerrule {
    name = notifications
    blur = true
    ignore_alpha = 0
}


