# ╔══════════════════════════════════════════════════════════════╗
# ║              Keybindings — Omarchy-aligned                   ║
# ╚══════════════════════════════════════════════════════════════╝

$mod = SUPER

# ── Core Applications (Omarchy-style) ─────────────────────────
bind = $mod, Return, exec, kitty
bind = $mod, Space, exec, rofi -show drun -theme ~/.config/rofi/theme.rasi
bind = $mod, B, exec, google-chrome
bind = $mod, E, exec, thunar
bind = $mod, O, exec, /home/aum/Applications/Obsidian-1.12.7_da107e373fd47407b646a82094c14331.AppImage --no-sandbox
bind = $mod, A, exec, /usr/share/antigravity/antigravity
bind = $mod, R, exec, obs
bind = $mod SHIFT, D, exec, kitty -e lazydocker

# ── Window Management ─────────────────────────────────────────
bind = $mod, W, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, T, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# ── Focus Navigation (Arrow keys) ────────────────────────────
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# ── Focus Navigation (Vim-style, Alt modifier to avoid J conflict)
bind = $mod ALT, h, movefocus, l
bind = $mod ALT, l, movefocus, r
bind = $mod ALT, k, movefocus, u
bind = $mod ALT, j, movefocus, d

# ── Move Windows ──────────────────────────────────────────────
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# ── Resize Windows ────────────────────────────────────────────
binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, left, resizeactive, -30 0
binde = $mod CTRL, up, resizeactive, 0 -30
binde = $mod CTRL, down, resizeactive, 0 30

binde = $mod CTRL, l, resizeactive, 30 0
binde = $mod CTRL, h, resizeactive, -30 0
binde = $mod CTRL, k, resizeactive, 0 -30
binde = $mod CTRL, j, resizeactive, 0 30

# ── Workspaces ────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# ── Move to Workspace ────────────────────────────────────────
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Workspace Scroll ─────────────────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# ── Mouse Binds ───────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Screenshots ───────────────────────────────────────────────
# Print = Region select + copy to clipboard (default)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
# Super+Print = Full screen to clipboard
bind = $mod, Print, exec, grim - | wl-copy && notify-send "Screenshot" "Full screen copied"
# Super+Shift+Print = Region saved to file
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Saved to file"

# ── Media Keys ────────────────────────────────────────────────
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Lock Screen (Omarchy: Super+Ctrl+L) ──────────────────────
bind = $mod CTRL, L, exec, hyprlock

# ── Keybind Cheatsheet (Omarchy: Super+K) ────────────────────
bind = $mod, K, exec, ~/.config/hypr/scripts/keybinds.sh

# ── Clipboard History ─────────────────────────────────────────
bind = $mod, C, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/theme.rasi -p "Clipboard" | cliphist decode | wl-copy
